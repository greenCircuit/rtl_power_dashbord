<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RTL Power Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #111; color: #ddd; }

    .card { background: #1a1a1a; border-color: #2a2a2a; }

    /* Heatmap canvas container */
    #heatmap-wrap {
      position: relative;
      width: 100%;
      height: 480px;
      background: #0d0d0d;
      border-radius: 4px;
      overflow: hidden;
    }
    #heatmap-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    #heatmap-tooltip {
      position: absolute;
      background: rgba(15,15,15,.92);
      color: #eee;
      padding: 6px 10px;
      border-radius: 5px;
      border: 1px solid #444;
      font-size: 12px;
      font-family: monospace;
      pointer-events: none;
      white-space: nowrap;
      z-index: 10;
      line-height: 1.6;
    }
    #heatmap-empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 15px;
    }

    /* Fixed-height chart containers */
    .chart-box { position: relative; width: 100%; }
    .chart-box-sm  { height: 240px; }
    .chart-box-md  { height: 300px; }
    .chart-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #555;
      font-size: 14px;
    }

    /* Range button active state */
    .btn-range.active {
      background-color: var(--bs-primary);
      border-color: var(--bs-primary);
      color: #fff;
    }

    /* Table tweaks */
    .table th { color: #aaa; font-weight: 600; font-size: .82rem; text-transform: uppercase; letter-spacing: .04em; }
    .table td { vertical-align: middle; font-size: .9rem; }

    /* Sticky filter panel */
    .sticky-filter {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #1a1a1a;
    }

    /* Slider labels */
    .slider-label { font-size: .82rem; color: #888; }

    /* Colorbar for heatmap */
    #colorbar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 480px;
      padding: 30px 0 50px;
      gap: 4px;
    }
    #colorbar-canvas { width: 18px; flex: 1; border-radius: 3px; }
    .colorbar-label { font-size: 11px; color: #999; }
  </style>
</head>
<body>
<div class="container-fluid py-3">

  <!-- Header -->
  <div class="row mb-3">
    <div class="col text-center">
      <h4 class="mb-0 fw-bold">RTL Power Dashboard</h4>
    </div>
  </div>

  <!-- Band management -->
  <div class="card mb-3">
    <div class="card-body">
      <div class="d-flex align-items-center mb-2 gap-2">
        <span class="fw-bold">Bands</span>
        <button class="btn btn-primary btn-sm" id="btn-add-band">+ Add Band</button>
      </div>
      <div id="band-table-wrap">
        <span class="text-muted small">Loading…</span>
      </div>
    </div>
  </div>

  <!-- Band selector + status -->
  <div class="row mb-2 align-items-end">
    <div class="col-md-4 col-sm-6">
      <label class="form-label mb-1 small text-muted">Viewing band</label>
      <select class="form-select form-select-sm" id="band-select">
        <option value="">Select a band…</option>
      </select>
    </div>
    <div class="col-md-8 col-sm-6">
      <span id="status-text" class="text-muted small"></span>
    </div>
  </div>

  <!-- Filter panel -->
  <div class="card mb-3 border-secondary sticky-filter" style="border-style:dashed!important">
    <div class="card-body py-2">
      <div class="row align-items-end g-2 mb-2">
        <div class="col-auto d-flex align-items-end">
          <span class="fw-semibold small">Filters</span>
        </div>
        <div class="col-auto">
          <div class="btn-group btn-group-sm" role="group">
            <button class="btn btn-outline-secondary btn-range" data-range="15m">15m</button>
            <button class="btn btn-outline-secondary btn-range" data-range="1h">1h</button>
            <button class="btn btn-outline-secondary btn-range" data-range="12h">12h</button>
            <button class="btn btn-outline-secondary btn-range" data-range="1d">1d</button>
            <button class="btn btn-outline-secondary btn-range" data-range="7d">7d</button>
            <button class="btn btn-outline-secondary btn-range active" data-range="all">All</button>
          </div>
        </div>
        <div class="col-md-2 col-sm-4">
          <label class="form-label mb-1 small">Freq Min (MHz)</label>
          <input type="number" class="form-control form-control-sm" id="filter-freq-min" placeholder="e.g. 88">
        </div>
        <div class="col-md-2 col-sm-4">
          <label class="form-label mb-1 small">Freq Max (MHz)</label>
          <input type="number" class="form-control form-control-sm" id="filter-freq-max" placeholder="e.g. 108">
        </div>
        <div class="col-md-2 col-sm-6">
          <label class="form-label mb-1 small">Time Start</label>
          <input type="datetime-local" class="form-control form-control-sm" id="filter-time-start">
        </div>
        <div class="col-md-2 col-sm-6">
          <label class="form-label mb-1 small">Time End</label>
          <input type="datetime-local" class="form-control form-control-sm" id="filter-time-end">
        </div>
        <div class="col-auto">
          <button class="btn btn-secondary btn-sm" id="btn-filter-clear">Clear</button>
        </div>
      </div>
      <div class="row align-items-center g-2 mt-1">
        <div class="col-auto">
          <span class="slider-label">Min Power (dBFS):</span>
        </div>
        <div class="col">
          <input type="range" class="form-range" id="filter-power-min" min="-20" max="20" step="1" value="-20">
        </div>
        <div class="col-auto">
          <span class="slider-label" id="power-min-label">−20 dB</span>
        </div>
        <div class="col-auto ms-3">
          <span class="slider-label">Activity Threshold (dBFS):</span>
        </div>
        <div class="col">
          <input type="range" class="form-range" id="threshold" min="-20" max="20" step="1" value="0">
        </div>
        <div class="col-auto">
          <span class="slider-label" id="threshold-label">0 dB</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Time-of-day occupancy + Signal duration -->
  <div class="row mb-3">
    <div class="col-md-6 mb-2">
      <div class="chart-box" style="height:260px;" id="tod-wrap">
        <canvas id="tod-canvas"></canvas>
        <div class="chart-placeholder" id="tod-empty">No band selected</div>
      </div>
    </div>
    <div class="col-md-6 mb-2">
      <div class="chart-box" style="height:260px;" id="duration-wrap">
        <canvas id="duration-canvas" style="display:none;"></canvas>
        <div class="chart-placeholder" id="duration-empty">No band selected</div>
      </div>
    </div>
  </div>

  <!-- Heatmap -->
  <div class="row mb-2">
    <div class="col" style="display:flex; gap:8px; align-items:stretch;">
      <div id="heatmap-wrap" style="flex:1;">
        <canvas id="heatmap-canvas"></canvas>
        <canvas id="heatmap-crosshair" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></canvas>
        <div id="heatmap-tooltip" style="display:none;"></div>
        <div id="heatmap-empty">No band selected</div>
      </div>
      <div id="colorbar-wrap" style="display:none;">
        <span class="colorbar-label" id="cb-max">0</span>
        <canvas id="colorbar-canvas"></canvas>
        <span class="colorbar-label" id="cb-min">0</span>
        <span class="colorbar-label mt-1" style="font-size:10px">dBFS</span>
      </div>
    </div>
  </div>

  <!-- Timeseries (shown after heatmap click) -->
  <div class="row mb-3">
    <div class="col">
      <div class="chart-box chart-box-sm" id="timeseries-wrap">
        <div class="chart-placeholder" id="timeseries-empty">Click a frequency on the heatmap to see power over time</div>
        <canvas id="timeseries-canvas" style="display:none;"></canvas>
      </div>
    </div>
  </div>

  <!-- Spectrum + Activity -->
  <div class="row mb-1">
    <div class="col-12">
      <h6 class="mb-2 text-muted">Frequency Usage</h6>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6 mb-3">
      <div class="chart-box chart-box-md" id="spectrum-wrap">
        <div class="chart-placeholder" id="spectrum-empty">No band selected</div>
        <canvas id="spectrum-canvas" style="display:none;"></canvas>
      </div>
    </div>
    <div class="col-md-6 mb-3">
      <div class="chart-box chart-box-md" id="activity-wrap">
        <div class="chart-placeholder" id="activity-empty">No band selected</div>
        <canvas id="activity-canvas" style="display:none;"></canvas>
      </div>
    </div>
  </div>


</div><!-- /container -->

<!-- Add / Edit Band Modal -->
<div class="modal fade" id="band-modal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="background:#1a1a1a;">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-title">Add Band</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" id="modal-name" placeholder="e.g. FM Radio">
        </div>
        <div class="row g-3 mb-3">
          <div class="col-4">
            <label class="form-label">Freq Start</label>
            <div class="input-group">
              <input type="number" class="form-control" id="modal-freq-start" placeholder="88">
              <select class="form-select" id="modal-freq-start-unit" style="max-width:80px;">
                <option value="k">kHz</option>
                <option value="M" selected>MHz</option>
                <option value="G">GHz</option>
              </select>
            </div>
          </div>
          <div class="col-4">
            <label class="form-label">Freq End</label>
            <div class="input-group">
              <input type="number" class="form-control" id="modal-freq-end" placeholder="108">
              <select class="form-select" id="modal-freq-end-unit" style="max-width:80px;">
                <option value="k">kHz</option>
                <option value="M" selected>MHz</option>
                <option value="G">GHz</option>
              </select>
            </div>
          </div>
          <div class="col-4">
            <label class="form-label">Step</label>
            <div class="input-group">
              <input type="number" class="form-control" id="modal-freq-step" placeholder="0.2">
              <select class="form-select" id="modal-freq-step-unit" style="max-width:80px;">
                <option value="k">kHz</option>
                <option value="M" selected>MHz</option>
                <option value="G">GHz</option>
              </select>
            </div>
          </div>
        </div>
        <div class="row g-3 mb-2">
          <div class="col-4">
            <label class="form-label">Interval (s)</label>
            <input type="number" class="form-control" id="modal-interval" value="10" min="1">
          </div>
          <div class="col-4">
            <label class="form-label">Min Power (dB)</label>
            <input type="number" class="form-control" id="modal-min-power" value="2" step="0.5">
          </div>
          <div class="col-4">
            <label class="form-label">Device</label>
            <select class="form-select" id="modal-device-index">
              <option value="0">Device 0</option>
            </select>
          </div>
        </div>
        <div id="modal-error" class="text-danger small mt-1"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" id="btn-modal-save">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="{{ url_for('static', filename='js/dashboard.js', v=3) }}"></script>
</body>
</html>
