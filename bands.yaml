# Default band configurations loaded on first startup.
# Bands are seeded into the database only if a band with the same id does not
# already exist — so editing a band in the UI will not be overwritten on restart.
#
# Frequency strings use rtl_power notation: value + unit suffix
#   k = kHz   M = MHz   G = GHz
# Examples: "462.5M", "25k", "1.2G"

# remove older data automatically because can gather too much data if left running
clean_up:
  enabled: true
  # rules for cleaning data, they are or statement
  interval: "7d"          # keep data worth of 7 days
  db_max_size_mb: "1024"  # maximum size of database allowed

DEMO_MODE: false
bands:
  - id: gmrs
    name: GMRS
    freq_start: "462.5M"
    freq_end:   "462.8M"
    freq_step:  "12.5k"   
    interval_s: 10
    min_power: 1         # -100 will allow recording anything, but will fill database pretty quickly and make more unnecessary db load
    device_index: 0
    is_active: true

  - id: vhf-144-165
    name: VHF 144-165
    freq_start: "144M"
    freq_end:   "165M"
    freq_step:  "12.5k"
    interval_s: 100
    min_power: 1
    device_index: 0
    is_active: true

