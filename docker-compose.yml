services:
  dashboard:
    image: localhost/rtl-app:latest
    network_mode: host
    volumes:
      # Persists the SQLite database, CSV captures, and log file on the host
      - ./data:/app/data
    # Pass all USB buses through so the SDR dongle is accessible
    devices:
      - /dev/bus/usb:/dev/bus/usb
    environment:
      HOST: "0.0.0.0"
      PORT: "8050"
      FLASK_DEBUG: "false"
      DATA_DIR: "/app/data"
      BANDS_CONFIG: "/app/config.yaml"
      LOG_PATH: "/app/data/app.log"
    restart: unless-stopped
