stages:
- semver
- test
- build
- security
- release

include:
  - project: home-lab/pipeline-catalog
    file: pipelines/release.yaml
  - project: home-lab/pipeline-catalog
    file: pipelines/security.yaml
  - project: home-lab/pipeline-catalog
    file: pipelines/stages.yaml
  - project: home-lab/pipeline-catalog
    file: pipelines/build.yaml
  - template: Jobs/SAST.gitlab-ci.yml

variables:
  BUILD_VERSION: 1.0.0

lint:
  stage: test
  image: pipelinecomponents/flake8:latest 
  script:
    - flake8 .
  allow_failure: true 

# releases jobs
#release-dry-run:
#  extends: .semantic-release-dry-run

unit-test:
  stage: test
  image: registry.dev.local/home-lab/rtl_power_dashbord:latest
  script:
    - pip install -r requirements.txt --quiet
    - coverage run -m pytest tests/ -v
    - coverage report
    - coverage xml -o coverage.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

ui-test:
  stage: test
  image: node:22-slim
  script:
    - cd ui
    - npm ci --quiet
    - npx vitest run

dead-code:
  stage: test
  image: python:3.13-slim
  script:
    - pip install vulture --quiet
    - vulture app/ --min-confidence 80
  allow_failure: true

img-base:
  needs: []
  extends: .create_image

# Security scans
semgrep-sast:
  stage: security
  image:
    name: returntocorp/semgrep:latest
    entrypoint: [""]
  script:
    - semgrep scan --config auto --text --severity WARNING --severity ERROR .
  allow_failure: true

trivy-dependency-scan:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs . --scanners vuln --exit-code 1 --severity HIGH,CRITICAL

pip-audit:
  stage: security
  image: python:3.13-slim
  script:
    - pip install pip-audit --quiet
    - pip-audit -r requirements.txt --severity high

dockerfile-check:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy config . --exit-code 1 --severity HIGH,CRITICAL --skip-dirs k8s-deploy --skip-files Dockerfile.sandbox

git-leaks:
  stage: security
  extends: .secrets_scan

